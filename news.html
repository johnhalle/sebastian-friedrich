<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sebastian Friedrich – News</title>
  <meta name="description" content="News, Ausstellungen, Präsentationen und offene Ateliers von Sebastian Friedrich.">
  <meta property="og:title" content="Sebastian Friedrich – News">
  <meta property="og:description" content="Aktuelle und ausgewählte Veranstaltungen von Sebastian Friedrich.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="sf-base.css?v=23">
  <style>

    .news-page {
      width: var(--site-width);
      max-width: var(--max-w);
      margin: 0 auto;
      padding: clamp(56px, 8vw, 104px) 0;
    }
    .page-title {
      
      font-weight: 300;
      letter-spacing: -0.07em;
      line-height: 0.9;
      text-transform: uppercase;
      margin: 0 0 clamp(52px, 8vw, 96px);
      padding-bottom: clamp(24px, 4vw, 40px);
      border-bottom: 1px solid var(--black);
    }
    .news-list {
      display: grid;
      gap: clamp(64px, 10vw, 132px);
    }
    .news-item {
      display: grid;
      grid-template-columns: 158px minmax(0, 1fr);
      gap: clamp(40px, 5.5vw, 88px);
      align-items: start;
      scroll-margin-top: calc(var(--nav-h) + 24px);
    }
    .news-year {
      font-size: clamp(2.7rem, 6vw, 5rem);
      font-weight: 500;
      line-height: 0.9;
      letter-spacing: -0.07em;
      color: #e9e9e9;
      position: sticky;
      top: calc(var(--nav-h) + 24px);
    }
    .news-content {
      min-width: 0;
      border-top: 1px solid var(--gray-mid);
      padding-top: 24px;
    }
    .news-title {
      font-size: clamp(1.55rem, 3vw, 2.45rem);
      line-height: 1.15;
      letter-spacing: -0.035em;
      font-weight: 300;
      margin: 0 0 10px;
      max-width: 820px;
    }
    .news-meta-line {
      font-size: 0.8125rem;
      color: var(--gray-dark);
      line-height: 1.55;
      margin-bottom: 22px;
    }
    .news-text {
      font-size: clamp(1rem, 1.35vw, 1.125rem);
      line-height: 1.72;
      font-weight: 300;
      max-width: 820px;
      margin-bottom: 26px;
    }
    .news-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 22px;
    }
    .news-tag {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--gray-mid);
      border-radius: 2px;
      padding: 4px 8px;
      font-size: 0.6875rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray-dark);
    }
    .news-facts {
      list-style: none;
      display: grid;
      max-width: 680px;
      margin: 0 0 26px;
      padding: 0;
    }
    .news-facts li {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr);
      gap: 18px;
      padding: 7px 0;
      border-bottom: 1px solid var(--gray-mid);
      font-size: 0.875rem;
      line-height: 1.45;
    }
    .news-facts-label {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-dark);
      padding-top: 2px;
    }
    .news-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      margin: 0 0 34px;
    }
    .news-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--black);
      padding-bottom: 3px;
    }
    .news-link::after { content: '→'; }
    .news-link-button {
      font-size: 0.8125rem;
      padding: 8px 18px;
    }
    .news-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 240px), 1fr));
      gap: 14px;
      align-items: start;
      max-width: 860px;
    }
    .news-gallery.single {
      grid-template-columns: minmax(0, 720px);
    }
    .news-image-button {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }
    .news-image-button img {
      width: 100%;
      max-height: 520px;
      object-fit: cover;
      object-position: center;
      background: var(--gray-light);
      transition: opacity 0.2s;
    }
    .news-gallery.single .news-image-button img {
      object-fit: contain;
      object-position: left top;
      max-height: 620px;
    }
    .news-image-button:hover img { opacity: 0.86; }
    .news-image-caption {
      margin-top: 8px;
      font-size: 0.75rem;
      line-height: 1.5;
      color: var(--gray-dark);
    }
    .news-image-caption > span { display: block; }
    .news-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 260;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      padding: 24px clamp(16px, 3vw, 48px);
    }
    .news-lightbox.open { display: flex; }
    .news-lightbox-card {
      width: min(1100px, calc(100vw - 112px));
      height: min(90dvh, calc(100dvh - 64px));
      max-height: calc(100dvh - 64px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      background: var(--white);
      overflow: hidden;
    }
    .news-lightbox-image-wrap {
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(20px, 3vw, 40px);
      background: var(--white);
      cursor: pointer;
      overflow: hidden;
    }
    .news-lightbox-image-wrap img {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center center;
    }
    .news-lightbox-info {
      border-left: 1px solid var(--gray-mid);
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .news-lightbox-close {
      align-self: flex-end;
      border: none;
      background: transparent;
      color: var(--gray-dark);
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1.125rem;
      line-height: 1;
      padding: 0;
      margin-bottom: 28px;
    }
    .news-lightbox-close:hover { color: var(--black); }
    .news-lightbox-counter {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-dark);
      margin-bottom: 14px;
    }
    .news-lightbox-title {
      font-size: 1.375rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
      font-weight: 300;
      margin-bottom: 24px;
    }
    .news-lightbox-caption {
      font-size: 0.8125rem;
      line-height: 1.65;
      color: var(--gray-dark);
      margin-bottom: 24px;
    }
    .news-lightbox-caption p { margin: 0 0 12px; }
    .news-lightbox-nav {
      margin-top: auto;
      display: flex;
      gap: 10px;
    }
    .news-lightbox-nav button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--gray-mid);
      background: var(--white);
      cursor: pointer;
      font-size: 1.4rem;
      line-height: 1;
    }
    .news-lightbox-nav button:disabled { opacity: 0.25; cursor: default; }

    .news-lightbox-info { position: relative; padding-top: 72px; }
    .news-lightbox-close {
      position: absolute;
      top: 32px;
      right: 28px;
      margin-bottom: 0;
    }
    .news-lightbox-counter {
      position: absolute;
      top: 29px;
      left: 50%;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      white-space: nowrap;
      margin: 0;
    }
    .news-lightbox-counter-nav {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--gray-dark);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1.125rem;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
    }
    .news-lightbox-counter-nav:disabled { opacity: 0.25; cursor: default; }
    @media (max-width: 760px) {
      .news-page { width: auto; max-width: none; padding-left: clamp(16px, 5vw, 24px); padding-right: clamp(16px, 5vw, 24px); padding-bottom: clamp(64px, 12vw, 92px); }
      .page-title {
        font-size: clamp(4.6rem, 22vw, 6.6rem);
        letter-spacing: -0.06em;
        margin-bottom: clamp(62px, 16vw, 88px);
      }
      .news-item { grid-template-columns: 1fr; gap: 10px; }
      .news-year { position: static; font-size: 3rem; }
      .news-facts li { grid-template-columns: 1fr; gap: 2px; }
      .news-lightbox { padding: 0; background: var(--white); }
      .news-lightbox-card {
        width: 100vw;
        height: 100dvh;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
      }
      .news-lightbox-image-wrap { padding: 16px; min-height: 0; }
      .news-lightbox-info {
        border-left: 0;
        border-top: 1px solid var(--gray-mid);
        padding: 16px 20px 24px;
      }
      .news-lightbox-close { top: 16px; right: 20px; margin-bottom: 0; }
      .news-lightbox-counter { top: 14px; }
      .news-lightbox-info { padding-top: 56px; }
      .news-lightbox-title { font-size: 1.125rem; margin-bottom: 10px; }
    }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Sebastian Friedrich</a>
    <ul class="nav-links">
      <li><a href="werke.html" data-i18n="nav.werke">Werke</a></li>
      <li><a href="news.html" class="active" data-i18n="nav.news">News</a></li>
      <li><a href="katalog.html" data-i18n="nav.katalog">Katalog</a></li>
      <li><a href="vita.html" data-i18n="nav.vita">Vita</a></li>
      <li><a href="kontakt.html" data-i18n="nav.kontakt">Kontakt</a></li>
      <li><button class="nav-lang" id="nav-lang-btn" onclick="toggleLang()">EN</button></li>
    </ul>
    <button class="nav-hamburger" id="hamburger" onclick="openMenu()" aria-label="Menü öffnen"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="nav-overlay" id="nav-overlay">
  <button class="overlay-close" onclick="closeMenu()" aria-label="Menü schließen">×</button>
  <a href="werke.html" onclick="closeMenu()" data-i18n="nav.werke">Werke</a>
  <a href="news.html" onclick="closeMenu()" data-i18n="nav.news">News</a>
  <a href="katalog.html" onclick="closeMenu()" data-i18n="nav.katalog">Katalog</a>
  <a href="vita.html" onclick="closeMenu()" data-i18n="nav.vita">Vita</a>
  <a href="kontakt.html" onclick="closeMenu()" data-i18n="nav.kontakt">Kontakt</a>
  <button class="overlay-lang" onclick="toggleLang(); closeMenu();" id="overlay-lang-btn">EN</button>
</div>
<main class="news-page">
  <h1 class="page-title" data-i18n="nav.news">News</h1>
  <div class="news-list" id="news-list"><div class="loading">Lädt…</div></div>
</main>

<div class="news-lightbox" id="news-lightbox" aria-hidden="true">
  <div class="news-lightbox-card" role="dialog" aria-modal="true" aria-labelledby="news-lightbox-title">
    <div class="news-lightbox-image-wrap" id="news-lightbox-next-area">
      <img id="news-lightbox-img" src="" alt="">
    </div>
    <div class="news-lightbox-info">
      <button class="news-lightbox-close" id="news-lightbox-close" type="button" aria-label="Schließen">✕</button>
      <p class="news-lightbox-counter" id="news-lightbox-counter"></p>
      <h2 class="news-lightbox-title" id="news-lightbox-title"></h2>
      <div class="news-lightbox-caption" id="news-lightbox-caption"></div>
      <div class="news-lightbox-nav">
        <button id="news-lightbox-prev" type="button" aria-label="Vorheriges Bild">‹</button>
        <button id="news-lightbox-next" type="button" aria-label="Nächstes Bild">›</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <span class="footer-copy">© <span id="footer-year"></span> Sebastian Friedrich</span>
  <ul class="footer-links">
    <li><a href="impressum.html" data-i18n="footer.impressum">Impressum</a></li>
    <li><a href="datenschutz.html" data-i18n="footer.datenschutz">Datenschutz</a></li>
    <li><a href="#" id="footer-instagram" target="_blank" rel="noopener">Instagram</a></li>
  </ul>
</footer>
<script src="sf-base.js?v=23"></script>
<script>
let NEWS_ITEMS = [];
let NEWS_LIGHTBOX_ID = null;
let NEWS_LIGHTBOX_INDEX = 0;

function esc(s) {
  return String(s ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}
function attr(s) { return esc(s).replace(/'/g, '&#39;'); }
function textField(obj, field) {
  if (!obj) return '';
  if (LANG === 'en' && obj[field + '_en']) return obj[field + '_en'];
  return obj[field] || obj[field + '_de'] || '';
}
function normalizeImages(n) {
  const raw = Array.isArray(n.bilder) && n.bilder.length
    ? n.bilder
    : [n.titelbild, ...(n.galerie || [])].filter(Boolean);
  return raw.map(item => typeof item === 'string'
    ? { src: item, beschreibung: '', beschreibung_en: '', copyright: '' }
    : item
  ).filter(img => img && img.src);
}
function renderFacts(n) {
  const rows = [
    { label: LANG === 'en' ? 'Type' : 'Art', value: textField(n, 'kategorie') },
    { label: LANG === 'en' ? 'Location' : 'Ort', value: n.ort },
    { label: LANG === 'en' ? 'Organizer' : 'Veranstalter', value: n.veranstalter },
    { label: LANG === 'en' ? 'Period' : 'Zeitraum', value: textField(n, 'zeitraum') }
  ].filter(row => row.value);
  if (!rows.length) return '';
  return `<ul class="news-facts">${rows.map(row => `<li><span class="news-facts-label">${esc(row.label)}</span><span>${esc(row.value)}</span></li>`).join('')}</ul>`;
}
function renderLinks(n) {
  const links = [];
  if (n.internal_url) links.push(`<a class="btn btn-outline news-link-button" href="${attr(n.internal_url)}">${esc(textField(n, 'internal_label') || (LANG === 'en' ? 'More' : 'Mehr'))}</a>`);
  if (n.url) links.push(`<a class="news-link" href="${attr(n.url)}" target="_blank" rel="noopener">${esc(textField(n, 'url_label') || (LANG === 'en' ? 'Website' : 'Website'))}</a>`);
  if (n.pdf) links.push(`<a class="news-link" href="${attr(n.pdf)}" target="_blank" rel="noopener">${esc(textField(n, 'pdf_label') || 'PDF')}</a>`);
  return links.length ? `<div class="news-links">${links.join('')}</div>` : '';
}
function renderTags(n) {
  const tags = (LANG === 'en' && Array.isArray(n.tags_en) ? n.tags_en : (n.tags || [])).filter(Boolean);
  if (!tags.length) return '';
  return `<div class="news-tags">${tags.map(tag => `<span class="news-tag">${esc(tag)}</span>`).join('')}</div>`;
}
function renderImageCaption(img) {
  const desc = textField(img, 'beschreibung');
  const copy = img.copyright || '';
  if (!desc && !copy) return '';
  return `<p class="news-image-caption">${desc ? `<span>${esc(desc)}</span>` : ''}${copy ? `<span>${esc(copy)}</span>` : ''}</p>`;
}
function renderGallery(n) {
  const images = normalizeImages(n);
  if (!images.length) return '';
  const singleClass = images.length === 1 ? ' single' : '';
  return `<div class="news-gallery${singleClass}">${images.map((img, index) => `
    <figure>
      <button class="news-image-button" type="button" data-news-id="${attr(n.id)}" data-news-index="${index}" aria-label="${esc(textField(n, 'titel'))} – Bild ${index + 1} öffnen">
        <img src="${attr(img.src)}" alt="${attr(textField(img, 'beschreibung') || textField(n, 'titel'))}" loading="lazy">
      </button>
      ${renderImageCaption(img)}
    </figure>
  `).join('')}</div>`;
}
function renderNews(data) {
  NEWS_ITEMS = [...(data.news || [])].sort((a, b) => String(b.datum || '').localeCompare(String(a.datum || '')));
  const list = document.getElementById('news-list');
  if (!NEWS_ITEMS.length) { list.innerHTML = ''; return; }
  list.innerHTML = NEWS_ITEMS.map(n => `
    <article class="news-item" id="${attr(n.id)}">
      <div class="news-year">${esc(n.jahr || (n.datum || '').slice(0,4))}</div>
      <div class="news-content">
        <h2 class="news-title">${esc(textField(n, 'titel'))}</h2>
        <p class="news-meta-line">${esc([textField(n, 'zeitraum'), n.ort].filter(Boolean).join(' · '))}</p>
        ${renderTags(n)}
        <p class="news-text">${esc(textField(n, 'text'))}</p>
        ${renderFacts(n)}
        ${renderLinks(n)}
        ${renderGallery(n)}
      </div>
    </article>
  `).join('');
  document.querySelectorAll('[data-news-id]').forEach(btn => {
    btn.addEventListener('click', () => openNewsLightbox(btn.dataset.newsId, Number(btn.dataset.newsIndex || 0)));
  });
  if (location.hash) {
    setTimeout(() => document.querySelector(location.hash)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 0);
  }
}
function currentNews() { return NEWS_ITEMS.find(n => n.id === NEWS_LIGHTBOX_ID); }
function currentImages() { return normalizeImages(currentNews() || {}); }
function openNewsLightbox(newsId, index) {
  NEWS_LIGHTBOX_ID = newsId;
  NEWS_LIGHTBOX_INDEX = index || 0;
  renderNewsLightbox();
  const lb = document.getElementById('news-lightbox');
  lb.classList.add('open');
  lb.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}
function closeNewsLightbox() {
  const lb = document.getElementById('news-lightbox');
  lb.classList.remove('open');
  lb.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}
function renderNewsLightbox() {
  const n = currentNews();
  const images = currentImages();
  if (!n || !images.length) return;
  NEWS_LIGHTBOX_INDEX = Math.max(0, Math.min(NEWS_LIGHTBOX_INDEX, images.length - 1));
  const img = images[NEWS_LIGHTBOX_INDEX];
  const desc = textField(img, 'beschreibung');
  const copy = img.copyright || '';
  document.getElementById('news-lightbox-img').src = img.src;
  document.getElementById('news-lightbox-img').alt = desc || textField(n, 'titel');
  document.getElementById('news-lightbox-title').textContent = textField(n, 'titel');
  const counter = document.getElementById('news-lightbox-counter');
  if (images.length > 1) {
    counter.innerHTML = `
      <button type="button" class="news-lightbox-counter-nav" data-news-counter-prev aria-label="Vorheriges Bild" ${NEWS_LIGHTBOX_INDEX <= 0 ? 'disabled' : ''}>‹</button>
      <span>${NEWS_LIGHTBOX_INDEX + 1} / ${images.length}</span>
      <button type="button" class="news-lightbox-counter-nav" data-news-counter-next aria-label="Nächstes Bild" ${NEWS_LIGHTBOX_INDEX >= images.length - 1 ? 'disabled' : ''}>›</button>
    `;
    counter.querySelector('[data-news-counter-prev]')?.addEventListener('click', () => nextNewsImage(-1));
    counter.querySelector('[data-news-counter-next]')?.addEventListener('click', () => nextNewsImage(1));
  } else {
    counter.textContent = `${NEWS_LIGHTBOX_INDEX + 1} / ${images.length}`;
  }
  document.getElementById('news-lightbox-caption').innerHTML = [desc ? `<p>${esc(desc)}</p>` : '', copy ? `<p>${esc(copy)}</p>` : ''].join('');
  document.getElementById('news-lightbox-prev').disabled = NEWS_LIGHTBOX_INDEX <= 0;
  document.getElementById('news-lightbox-next').disabled = NEWS_LIGHTBOX_INDEX >= images.length - 1;
}
function nextNewsImage(dir) {
  const images = currentImages();
  const next = NEWS_LIGHTBOX_INDEX + dir;
  if (next < 0 || next >= images.length) return;
  NEWS_LIGHTBOX_INDEX = next;
  renderNewsLightbox();
}
function onLangChange() { if (DATA) renderNews(DATA); }
async function init() {
  applyI18n();
  initNav(false);
  initContactInteractions();
  const res = await fetch('data.json');
  DATA = await res.json();
  renderFooter(DATA);
  renderNews(DATA);
}
document.getElementById('news-lightbox-close').addEventListener('click', closeNewsLightbox);
document.getElementById('news-lightbox-prev').addEventListener('click', () => nextNewsImage(-1));
document.getElementById('news-lightbox-next').addEventListener('click', () => nextNewsImage(1));
document.getElementById('news-lightbox-next-area').addEventListener('click', () => nextNewsImage(1));
document.getElementById('news-lightbox').addEventListener('click', e => { if (e.target.id === 'news-lightbox') closeNewsLightbox(); });
document.addEventListener('keydown', e => {
  const open = document.getElementById('news-lightbox').classList.contains('open');
  if (!open) return;
  if (e.key === 'Escape') closeNewsLightbox();
  if (e.key === 'ArrowLeft') nextNewsImage(-1);
  if (e.key === 'ArrowRight') nextNewsImage(1);
});
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
