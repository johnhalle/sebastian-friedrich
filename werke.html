<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Werke – Sebastian Friedrich</title>
  <meta name="description" content="Alle Werke von Sebastian Friedrich. Malerei in Öl auf Leinwand und MDF.">

  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#ffffff">

  <link rel="stylesheet" href="sf-base.css?v=50">
  <style>
    /* Unterseitenkopf zentral in sf-base.css. */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--gray-mid);
      padding: 6px 16px;
      border-radius: 2px;
      background: var(--white);
      color: var(--gray-dark);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .filter-btn:hover { border-color: var(--black); color: var(--black); }
    .filter-btn.active {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    /* ── DESKTOP: LISTE (wechselndes Links-Rechts) ──────────── */
    .werke-liste {
      width: var(--site-width);
      max-width: 900px;
      margin: 0 auto;
      padding: clamp(40px, 6vw, 80px) 0;
      display: flex;
      flex-direction: column;
      gap: clamp(64px, 9vw, 112px);
    }

    .werk-zeile {
      display: grid;
      grid-template-columns: 900px 1fr;
      gap: 48px;
      align-items: end;
      position: relative;
      --connector-bottom-left: 0px;
      --connector-bottom-width: 0px;
      --connector-stem-left: 0px;
      --connector-stem-top: 0px;
      --connector-stem-height: 0px;
      --connector-top-width: 0px;
    }
    .werk-connector {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }
    .werk-connector-part {
      position: absolute;
      background: var(--gray-mid);
    }
    @media (min-width: 1121px) {
      .werk-zeile.connector-ready .werk-connector {
        opacity: 1;
      }
      .werk-connector-bottom {
        left: var(--connector-bottom-left);
        bottom: 0;
        width: var(--connector-bottom-width);
        height: 1px;
      }
      .werk-connector-stem {
        left: var(--connector-stem-left);
        top: var(--connector-stem-top);
        width: 1px;
        height: var(--connector-stem-height);
      }
      .werk-connector-top {
        top: var(--connector-stem-top);
        width: var(--connector-top-width);
        height: 1px;
      }
      .werk-zeile:not(.rechts) .werk-connector-top {
        left: var(--connector-stem-left);
      }
      .werk-zeile.rechts .werk-connector-top {
        left: calc(var(--connector-stem-left) - var(--connector-top-width));
      }
    }
    .werk-zeile.rechts {
      grid-template-columns: 1fr 900px;
    }
    .werk-zeile.rechts .werk-zeile-bild { order: 2; }
    .werk-zeile.rechts .werk-zeile-info { order: 1; text-align: right; }

    /* Bildspalte je Größengruppe */
    .werk-zeile[data-groesse="l"]  { grid-template-columns: 581px 1fr; }
    .werk-zeile[data-groesse="m"]  { grid-template-columns: 411px 1fr; }
    .werk-zeile[data-groesse="s"]  { grid-template-columns: 290px 1fr; }
    .werk-zeile[data-groesse="xs"] { grid-template-columns: 194px 1fr; }

    .werk-zeile.rechts[data-groesse="l"]  { grid-template-columns: 1fr 581px; }
    .werk-zeile.rechts[data-groesse="m"]  { grid-template-columns: 1fr 411px; }
    .werk-zeile.rechts[data-groesse="s"]  { grid-template-columns: 1fr 290px; }
    .werk-zeile.rechts[data-groesse="xs"] { grid-template-columns: 1fr 194px; }

    .werk-zeile-bild {
      cursor: pointer;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
    }
    /* Bild rechts: außenbündig rechts */
    .werk-zeile.rechts .werk-zeile-bild {
      justify-content: flex-end;
    }
    .werk-zeile-bild img {
      display: block;
      width: auto;
      height: auto;
      transition: opacity 0.2s;
    }
    .werk-zeile-bild:hover img { opacity: 0.85; }

    /* Info-Block: analog Lightbox — Titel oben, Details unten */
    /* Info-Block: Bild links → Info rechtsbündig außen */
    .werk-zeile-info {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-end;
      text-align: right;
      min-width: 0;
      overflow: hidden;
    }

    /* Info-Block: Bild rechts → Info linksbündig außen */
    .werk-zeile.rechts .werk-zeile-info {
      align-items: flex-start;
      text-align: left;
    }

    .werk-zeile-titel {
      font-size: clamp(1.25rem, 2.5vw, 2rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 0;
    }

    .werk-zeile-meta {
      margin-top: auto;
      padding-top: 24px;
    }

    .werk-zeile-meta-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      width: 240px;
    }
    .werk-zeile-meta-list li {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.8125rem;
      padding: 5px 0;
      border-bottom: 1px solid var(--gray-mid);
    }
    .werk-zeile-meta-list li:last-child { border-bottom: none; }
    .werk-zeile-meta-label {
      font-weight: 500;
      color: var(--gray-dark);
      font-size: 0.6875rem;
      letter-spacing: 0.1em;
      padding-top: 1px;
      flex-shrink: 0;
    }
    .werk-zeile-meta-list li span:last-child {
      text-align: right;
    }

    .werk-zeile-anfrage {
      margin-top: 24px;
    }

    .no-results {
      padding: 80px 0;
      text-align: center;
      color: var(--gray-dark);
      font-size: 0.9375rem;
      font-weight: 300;
    }

    /* ── TABLET/HOCHFORMAT: Größenklassen erhalten, Gap größer ── */
    @media (max-width: 900px) {
      .page-header-inner { width: auto; max-width: none; padding-left: clamp(16px, 5vw, 24px); padding-right: clamp(16px, 5vw, 24px); }
      .werke-liste {
        width: auto; max-width: none;
        padding: clamp(32px, 5vw, 56px) clamp(16px, 3vw, 24px);
        gap: clamp(72px, 10vw, 100px);
      }
      /* Bildspalten proportional skalieren */
      .werk-zeile[data-groesse="l"]        { grid-template-columns: 330px 1fr; gap: 28px; }
      .werk-zeile[data-groesse="m"]        { grid-template-columns: 242px 1fr; gap: 24px; }
      .werk-zeile[data-groesse="s"]        { grid-template-columns: 176px 1fr; gap: 20px; }
      .werk-zeile[data-groesse="xs"]       { grid-template-columns: 121px 1fr; gap: 16px; }
      .werk-zeile.rechts[data-groesse="l"] { grid-template-columns: 1fr 330px; }
      .werk-zeile.rechts[data-groesse="m"] { grid-template-columns: 1fr 242px; }
      .werk-zeile.rechts[data-groesse="s"] { grid-template-columns: 1fr 176px; }
      .werk-zeile.rechts[data-groesse="xs"]{ grid-template-columns: 1fr 121px; }
    }

    /* ── GESTAPELT: Bild oben, Text darunter, zentriert ── */
    @media (max-width: 1120px) {
      .werk-zeile {
        display: block !important;
        text-align: center;
      }
      .werk-connector {
        display: none !important;
      }
      .werk-zeile-bild {
        display: block;
        text-align: center;
        order: unset;
        margin-bottom: 28px;
      }
      .werk-zeile-bild img {
        display: inline-block;
        max-width: 100% !important;
        height: auto !important;
      }
      .werk-zeile-info,
      .werk-zeile.rechts .werk-zeile-info {
        display: flex;
        flex-direction: column;
        align-items: center !important;
        order: unset;
        text-align: center !important;
        width: 100%;
      }
      .werk-zeile-meta-list { align-items: center; }
      .werk-zeile-meta-list li { justify-content: center; }
      .werk-zeile-anfrage { text-align: center; }

      .werk-zeile[data-groesse="l"] .werk-zeile-bild img {
        max-width: 100% !important;
      }
      .werk-zeile[data-groesse="m"] .werk-zeile-bild img {
        max-width: min(90vw, 396px) !important;
      }
      .werk-zeile[data-groesse="s"] .werk-zeile-bild img {
        max-width: min(81vw, 297px) !important;
      }
      .werk-zeile[data-groesse="xs"] .werk-zeile-bild img {
        max-width: min(64vw, 209px) !important;
      }
    }
  </style>
</head>
<body>

<!-- NAV -->

<!-- MOBILE OVERLAY -->

<!-- SEITEN-HEADER -->
<div class="page-header page-header-werke">
  <div class="page-header-inner">
    <h1 class="page-title" data-i18n="werke.titel">Werke</h1>
    <div class="filter-bar">
      <button class="filter-btn active" id="filter-alle" onclick="setFilter('alle')" data-i18n="werke.filter.alle">Alle Werke</button>
      <button class="filter-btn" id="filter-verfuegbar" onclick="setFilter('verfuegbar')" data-i18n="werke.filter.verfuegbar">Verfügbare Werke</button>
    </div>
  </div>
</div>

<main>
  <div class="werke-liste" id="werke-liste"></div>
</main>


<script src="sf-base.js?v=50"></script>
<script>
/* ── SEITEN-SPEZIFISCH: werke.html ── */

let FILTER = 'alle';
let ALLE_IDS = [];

function setFilter(f) {
  FILTER = f;
  document.getElementById('filter-alle').classList.toggle('active', f === 'alle');
  document.getElementById('filter-verfuegbar').classList.toggle('active', f === 'verfuegbar');
  if (DATA) renderAll(DATA);
  history.replaceState({}, '', f === 'alle' ? 'werke.html' : 'werke.html?filter=verfuegbar');
}

function sortByJahr(werke) {
  return [...werke].sort((a, b) => b.jahr - a.jahr);
}

function buildSortedGrid(werke) {
  const reihenWerke = sortByJahr(werke.filter(w => w.reihe));
  const reihenIds   = new Set(reihenWerke.map(w => w.id));
  const ohneReihe   = sortByJahr(werke.filter(w => !reihenIds.has(w.id)));
  if (!reihenWerke.length) return ohneReihe;
  const neustesReihenJahr = reihenWerke[0].jahr;
  let insertAt = ohneReihe.findIndex(w => w.jahr < neustesReihenJahr);
  if (insertAt === -1) insertAt = ohneReihe.length;
  const result = [...ohneReihe];
  result.splice(insertAt, 0, ...reihenWerke);
  return result;
}

/* ── DESKTOP-LISTE ── */
// Längste-Seite-Pixel je Gruppe
const GROESSE_PX = { xs: 169, s: 266, m: 387, l: 557 };

function applyImageSize(img, groesse) {
  const px = GROESSE_PX[groesse] || 220;
  // Nach dem Laden: Hoch- oder Querformat bestimmen
  function setSide() {
    if (img.naturalWidth >= img.naturalHeight) {
      img.style.maxWidth  = px + 'px';
      img.style.maxHeight = '';
    } else {
      img.style.maxHeight = px + 'px';
      img.style.maxWidth  = '';
    }
    requestAnimationFrame(updateWerkConnectors);
  }
  if (img.complete && img.naturalWidth) {
    setSide();
  } else {
    img.addEventListener('load', setSide, { once: true });
  }
}

function updateWerkConnectors() {
  const rows = document.querySelectorAll('.werk-zeile');
  rows.forEach(row => row.classList.remove('connector-ready'));
  if (window.innerWidth <= 1120) return;

  rows.forEach(row => {
    const img = row.querySelector('.werk-zeile-bild img');
    const title = row.querySelector('.werk-zeile-titel');
    const meta = row.querySelector('.werk-zeile-meta');
    const cta = row.querySelector('.werk-zeile-anfrage .btn');
    if (!img || !title || !meta) return;

    const rowRect = row.getBoundingClientRect();
    const imgRect = img.getBoundingClientRect();
    const titleRect = title.getBoundingClientRect();
    const metaRect = meta.getBoundingClientRect();
    const infoRects = [titleRect, metaRect, cta?.getBoundingClientRect()].filter(Boolean);

    const isRechts = row.classList.contains('rechts');
    const imageSide = isRechts ? imgRect.left : imgRect.right;
    const infoInnerSide = isRechts
      ? Math.max(...infoRects.map(rect => rect.right))
      : Math.min(...infoRects.map(rect => rect.left));
    const infoOuterSide = isRechts
      ? Math.min(...infoRects.map(rect => rect.left))
      : Math.max(...infoRects.map(rect => rect.right));

    const stemOffset = 16;
    const minBottomLength = 26;
    const minStemHeight = 28;
    const stemX = isRechts
      ? Math.round(infoInnerSide - rowRect.left + stemOffset)
      : Math.round(infoInnerSide - rowRect.left - stemOffset);

    const bottomStart = Math.round(imageSide - rowRect.left);
    const bottomWidth = isRechts ? (bottomStart - stemX) : (stemX - bottomStart);
    const titleTopOffset = 30;
    const stemTop = Math.round(titleRect.top - rowRect.top - titleTopOffset);
    const stemHeight = Math.round(rowRect.bottom - rowRect.top - stemTop);
    const topOuter = Math.round(infoOuterSide - rowRect.left);
    const topWidth = isRechts ? (stemX - topOuter) : (topOuter - stemX);

    if (bottomWidth < minBottomLength || stemHeight < minStemHeight || topWidth < 24) return;

    const bottomLeft = isRechts ? stemX : bottomStart;
    row.style.setProperty('--connector-bottom-left', `${bottomLeft}px`);
    row.style.setProperty('--connector-bottom-width', `${bottomWidth}px`);
    row.style.setProperty('--connector-stem-left', `${stemX}px`);
    row.style.setProperty('--connector-stem-top', `${stemTop}px`);
    row.style.setProperty('--connector-stem-height', `${stemHeight}px`);
    row.style.setProperty('--connector-top-width', `${topWidth}px`);
    row.classList.add('connector-ready');
  });
}


let connectorResizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(connectorResizeTimer);
  connectorResizeTimer = setTimeout(updateWerkConnectors, 80);
});

function werkZeile(w, index, ids) {
  const seite = index % 2 === 0 ? '' : 'rechts';
  const groesse = w.groesse || 's';
  const medium = LANG === 'en' ? (w.medium_en || w.medium) : w.medium;

  const metaItems = [
    { label: ui('detail.jahr'),   val: w.jahr },
    { label: ui('detail.medium'), val: medium },
    { label: ui('detail.masse'),  val: w.masse },
    ...(w.reihe ? [{ label: 'Reihe', val: w.reihe }] : []),
  ].filter(m => m.val).map(m =>
    `<li><span class="werk-zeile-meta-label">${m.label}</span><span>${m.val}</span></li>`
  ).join('');

  const anfrage = w.verfuegbar
    ? `<div class="werk-zeile-anfrage"><button type="button" class="btn" data-contact-work="${w.id}">${ui('detail.anfrage')}</button></div>`
    : '';

  return `
    <div class="werk-zeile ${seite}" data-groesse="${groesse}">
      <div class="werk-connector" aria-hidden="true">
        <span class="werk-connector-part werk-connector-bottom"></span>
        <span class="werk-connector-part werk-connector-stem"></span>
        <span class="werk-connector-part werk-connector-top"></span>
      </div>
      <div class="werk-zeile-bild" data-id="${w.id}">
        <img src="${w.bild}" alt="${w.titel}, ${w.jahr}" loading="lazy">
      </div>
      <div class="werk-zeile-info">
        <h2 class="werk-zeile-titel">${w.titel}</h2>
        <div class="werk-zeile-meta">
          <ul class="werk-zeile-meta-list">${metaItems}</ul>
          ${anfrage}
        </div>
      </div>
    </div>
  `;
}

function renderListe(werke) {
  const liste = document.getElementById('werke-liste');
  if (!werke.length) {
    liste.innerHTML = `<p class="no-results">${LANG === 'en' ? 'No works found.' : 'Keine Werke gefunden.'}</p>`;
    return;
  }
  const ids = werke.map(w => w.id);
  liste.innerHTML = werke.map((w, i) => werkZeile(w, i, ids)).join('');
  liste.querySelectorAll('.werk-zeile').forEach(zeile => {
    const img = zeile.querySelector('img');
    const g   = zeile.dataset.groesse;
    if (img && g) {
      applyImageSize(img, g);
      img.addEventListener('load', updateWerkConnectors, { once: true });
    }
    // Lightbox-Klick
    const bild = zeile.querySelector('.werk-zeile-bild');
    if (bild) bild.addEventListener('click', () => openDetail(bild.dataset.id, ALLE_IDS));
  });
  requestAnimationFrame(updateWerkConnectors);
}

function renderAll(data) {
  const basis = FILTER === 'verfuegbar'
    ? data.werke.filter(w => w.verfuegbar)
    : data.werke;
  const sorted = buildSortedGrid(basis);
  ALLE_IDS = sorted.map(w => w.id);
  renderListe(sorted);
}

function onLangChange() {
  if (DATA) renderAll(DATA);
}

async function init() {
  applyI18n();
  initNav(false);
  initLightbox();
  initContactInteractions();

  const params = new URLSearchParams(location.search);
  if (params.get('filter') === 'verfuegbar') {
    FILTER = 'verfuegbar';
    document.getElementById('filter-alle').classList.remove('active');
    document.getElementById('filter-verfuegbar').classList.add('active');
  }
  const werkId = params.get('werk');

  try {
    const res = await fetch('data.json');
    DATA = await res.json();
    renderAll(DATA);
    renderFooter(DATA);
    if (werkId) openDetail(werkId);
  } catch(e) {
    console.error('data.json konnte nicht geladen werden:', e);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
