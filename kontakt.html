<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt – Sebastian Friedrich</title>
  <meta name="description" content="Kontakt zu Sebastian Friedrich. Anfragen zu Werken, Ausstellungen und Kooperationen.">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#ffffff">

  <link rel="stylesheet" href="sf-base.css?v=52">
  <style>
    /* Unterseitenkopf zentral in sf-base.css. */
    .kontakt-intro {
      max-width: 660px;
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .kontakt-social {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: clamp(32px, 5vw, 48px);
    }
    .kontakt-form-wrap {
      max-width: 900px;
      border-top: 1px solid var(--gray-mid);
      padding-top: clamp(24px, 3vw, 36px);
      padding-bottom: clamp(28px, 5vw, 48px);
    }
    @media (max-width: 640px) {
      .kontakt-inner { width: auto; max-width: none; padding-left: clamp(16px, 5vw, 24px); padding-right: clamp(16px, 5vw, 24px); }
    }
  </style>
</head>
<body>

<!-- NAV -->

<!-- MOBILE OVERLAY -->

<main class="kontakt-page">
  <div class="kontakt-inner">
    <h1 class="kontakt-title" data-i18n="contact.titel">Kontakt</h1>
    <p class="kontakt-intro" data-i18n="contact.intro">
      Für Anfragen, Kooperationen und Informationen zu verfügbaren Werken nutzen Sie bitte das Formular.
    </p>
    <div class="kontakt-social">
      <a class="contact-link" id="kontakt-instagram" href="https://www.instagram.com/sebastiano_friedrich/" target="_blank" rel="noopener" data-i18n="contact.instagram">Instagram</a>
    </div>
    <div class="kontakt-form-wrap">
      <form class="contact-form" id="contact-page-form" name="kontakt" method="POST" action="/danke.html" data-netlify="true" novalidate>
        <input type="hidden" name="form-name" value="kontakt">
        <input type="hidden" name="work_id" value="">
        <input type="hidden" name="work_title" value="">
        <input type="hidden" name="work_year" value="">
        <input type="hidden" name="page" value="">
        <div class="contact-form-grid">
          <label class="contact-field">
            <span class="contact-label" data-i18n="contact.name">Name</span>
            <input class="contact-input" type="text" name="name" autocomplete="name" required>
          </label>
          <label class="contact-field">
            <span class="contact-label" data-i18n="contact.email">E-Mail</span>
            <input class="contact-input" type="email" name="email" autocomplete="email" required>
          </label>
          <label class="contact-field contact-field-full">
            <span class="contact-label" data-i18n="contact.subject">Betreff</span>
            <input class="contact-input" type="text" name="subject" required>
          </label>
          <label class="contact-field contact-field-full contact-field-message">
            <span class="contact-label" data-i18n="contact.message">Nachricht</span>
            <textarea class="contact-textarea" name="message" required></textarea>
          </label>
        </div>
        <div class="contact-form-actions">
          <button class="btn" type="submit" data-i18n="contact.send">Nachricht senden</button>
          <span class="contact-status" data-contact-status aria-live="polite"></span>
        </div>
      </form>
    </div>
  </div>
</main>


<script src="sf-base.js?v=52"></script>
<script>
async function init() {
  applyI18n();
  initNav(false);
  const params = new URLSearchParams(location.search);
  const werkId = params.get('werk');
  try {
    const res = await fetch('data.json');
    DATA = await res.json();
    renderFooter(DATA);
    const insta = DATA?.meta?.kontakt?.instagram;
    if (insta) {
      document.getElementById('kontakt-instagram').href = insta;
    }
    initContactPageForm('contact-page-form', werkId);
  } catch(e) {
    console.error('data.json konnte nicht geladen werden:', e);
    initContactPageForm('contact-page-form', werkId);
  }
}

function onLangChange() {
  const params = new URLSearchParams(location.search);
  initContactPageForm('contact-page-form', params.get('werk'));
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
