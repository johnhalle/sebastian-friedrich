<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sebastian Friedrich – Katalog</title>
  <meta name="description" content="Sebastian Friedrich: ON STAGE. Malerei – Katalog mit Reader und Aufsatz.">
  <meta property="og:title" content="Sebastian Friedrich: ON STAGE. Malerei">
  <meta property="og:description" content="Katalog zum Werk Sebastian Friedrichs, erschienen 2026 im Mitteldeutschen Verlag.">
  <meta property="og:image" content="https://res.cloudinary.com/def9qgwtw/image/upload/v1780737694/001.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="sf-base.css?v=23">
  <style>

    .page-section {
      width: var(--site-width);
      max-width: var(--max-w);
      margin: 0 auto;
      padding: clamp(56px, 8vw, 104px) 0;
    }
    .katalog-page-head {
      padding-bottom: 0;
    }
    .katalog-page-title {
      
      font-weight: 300;
      letter-spacing: -0.07em;
      line-height: 0.9;
      text-transform: uppercase;
      margin: 0;
      padding-bottom: clamp(24px, 4vw, 40px);
      border-bottom: 1px solid var(--black);
    }
    .katalog-hero {
      display: grid;
      grid-template-columns: minmax(220px, 340px) minmax(0, 1fr);
      gap: clamp(42px, 7vw, 96px);
      align-items: start;
      border-bottom: 1px solid var(--gray-mid);
    }
    .katalog-hero-cover img {
      width: 100%;
      max-height: 520px;
      object-fit: contain;
      object-position: left top;
      box-shadow: 4px 4px 28px rgba(0,0,0,0.14);
    }
    .katalog-hero-title {
      font-size: clamp(2rem, 4.3vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.045em;
      font-weight: 300;
      margin: -0.1em 0 18px;
      max-width: 780px;
    }
    .katalog-biblio {
      list-style: none;
      display: grid;
      gap: 8px;
      margin: 0 0 34px;
      color: var(--gray-dark);
      font-size: 0.9375rem;
      line-height: 1.55;
    }
    .katalog-biblio strong {
      color: var(--black);
      font-weight: 400;
    }
    .katalog-teaser {
      font-size: clamp(1.05rem, 1.6vw, 1.25rem);
      line-height: 1.65;
      font-weight: 300;
      max-width: 700px;
      margin-bottom: 34px;
    }
    .katalog-actions { display: flex; gap: 14px; flex-wrap: wrap; }
    .essay-wrap {
      width: var(--site-width);
      max-width: var(--max-w);
      margin: 0 auto;
      padding: clamp(56px, 8vw, 104px) 0;
    }
    .essay-head {
      max-width: 760px;
      margin-bottom: clamp(36px, 5vw, 64px);
    }
    .essay-kicker {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray-dark);
      margin-bottom: 22px;
    }
    .essay-title {
      font-size: clamp(2rem, 4vw, 3.75rem);
      line-height: 1.08;
      letter-spacing: -0.045em;
      font-weight: 300;
      margin-bottom: 14px;
    }
    .essay-subtitle {
      font-size: clamp(1.15rem, 2vw, 1.45rem);
      line-height: 1.45;
      color: var(--gray-dark);
      font-weight: 300;
      margin-bottom: 18px;
    }
    .essay-authors {
      font-size: 0.8125rem;
      color: var(--gray-dark);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .essay-body {
      max-width: 760px;
      font-size: clamp(1.0625rem, 1.4vw, 1.25rem);
      line-height: 1.78;
      letter-spacing: -0.012em;
      font-weight: 300;
    }
    .essay-body p { margin: 0 0 1.55em; }
    .essay-body p:first-of-type { font-size: clamp(1.18rem, 1.7vw, 1.4rem); line-height: 1.68; }
    .essay-work-card {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: clamp(28px, 5vw, 56px);
      align-items: end;
      max-width: 760px;
      margin: clamp(44px, 7vw, 78px) 0;
    }
    .essay-work-image {
      appearance: none;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      display: flex;
      justify-content: flex-start;
      align-items: flex-end;
      width: 100%;
    }
    .essay-work-image img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      background: var(--gray-light);
      transition: opacity 0.2s;
    }
    .essay-work-image:hover img { opacity: 0.85; }
    .essay-work-info {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-end;
      text-align: right;
      min-width: 0;
      overflow: hidden;
    }
    .essay-work-title {
      font-size: clamp(1.5rem, 3vw, 2.3rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1.12;
      margin: 0 0 34px;
    }
    .essay-work-meta-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      width: min(240px, 100%);
      margin: 0;
      padding: 0;
    }
    .essay-work-meta-list li {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.8125rem;
      padding: 5px 0;
      border-bottom: 1px solid var(--gray-mid);
    }
    .essay-work-meta-list li:last-child { border-bottom: none; }
    .essay-work-meta-label {
      font-weight: 500;
      color: var(--gray-dark);
      font-size: 0.6875rem;
      letter-spacing: 0.1em;
      padding-top: 1px;
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .essay-work-meta-list li span:last-child { text-align: right; }
    @media (max-width: 760px) {
      .page-section, .essay-wrap { width: auto; max-width: none; padding-left: clamp(16px, 5vw, 24px); padding-right: clamp(16px, 5vw, 24px); }
      .katalog-page-head { padding-bottom: clamp(44px, 10vw, 64px); }
      .katalog-page-title {
        font-size: clamp(4.6rem, 22vw, 6.6rem);
        letter-spacing: -0.06em;
      }
      .katalog-hero { grid-template-columns: 1fr; padding-top: 0; }
      .katalog-hero-cover img { max-width: 260px; }
      .essay-body { max-width: none; }
      .essay-work-card {
        grid-template-columns: 1fr;
        gap: 20px;
        max-width: 260px;
      }
      .essay-work-info {
        align-items: flex-start;
        text-align: left;
      }
      .essay-work-meta-list li span:last-child { text-align: right; }
    }
  </style>
</head>
<body>

    <ul class="nav-links">

  <button class="overlay-close" onclick="closeMenu()" aria-label="Menü schließen">×</button>

<main class="katalog-page">
  <section class="page-section katalog-page-head"><h1 class="katalog-page-title" data-i18n="katalog.titel">Katalog</h1></section>
  <section class="page-section katalog-hero" id="katalog-hero"><div class="loading">Lädt…</div></section>
  <article class="essay-wrap" id="essay-wrap"><div class="loading">Lädt…</div></article>
</main>
<div class="lightbox" id="lightbox">
  <button class="lightbox-arrow" id="lb-prev" aria-label="Vorheriges Werk">‹</button>
  <div class="lightbox-card">
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" id="lb-img" src="" alt="">
    </div>
    <div class="lightbox-info">
      <button class="lightbox-close" id="lb-close" aria-label="Schließen">✕</button>
      <p class="lightbox-counter" id="lb-counter"></p>
      <h2 class="lightbox-titel" id="lb-titel"></h2>
      <ul class="lightbox-meta-list" id="lb-meta"></ul>
      <div id="lb-action"></div>
    </div>
  </div>
  <button class="lightbox-arrow" id="lb-next" aria-label="Nächstes Werk">›</button>
</div>
<div class="reader-modal" id="reader-modal" aria-hidden="true">
  <button class="reader-modal-close" type="button" id="reader-modal-close" aria-label="Reader schließen">×</button>
  <iframe id="reader-frame" title="Katalogreader" src="about:blank"></iframe>
</div>

<footer>
  <span class="footer-copy">© <span id="footer-year"></span> Sebastian Friedrich</span>
  <ul class="footer-links">
    <li><a href="impressum.html" data-i18n="footer.impressum">Impressum</a></li>
    <li><a href="datenschutz.html" data-i18n="footer.datenschutz">Datenschutz</a></li>
    <li><a href="#" id="footer-instagram" target="_blank" rel="noopener">Instagram</a></li>
  </ul>
</footer>
<script src="sf-base.js?v=23"></script>
<script>

function openReaderOverlay(url) {
  const modal = document.getElementById('reader-modal');
  const frame = document.getElementById('reader-frame');
  if (!modal || !frame) return;
  const src = url + (url.includes('?') ? '&' : '?') + 'embed=1';
  frame.src = src;
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
  document.body.classList.add('reader-open');
}
function closeReaderOverlay() {
  const modal = document.getElementById('reader-modal');
  const frame = document.getElementById('reader-frame');
  if (!modal || !frame) return;
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
  frame.src = 'about:blank';
  document.body.classList.remove('reader-open');
}
document.addEventListener('click', event => {
  const trigger = event.target.closest('[data-reader-open]');
  if (trigger) {
    event.preventDefault();
    openReaderOverlay(trigger.getAttribute('href'));
  }
  if (event.target.closest('#reader-modal-close')) closeReaderOverlay();
});
document.addEventListener('keydown', event => {
  if (event.key === 'Escape' && document.getElementById('reader-modal')?.classList.contains('open')) closeReaderOverlay();
});

function esc(s) {
  return String(s ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}
function attr(s) { return esc(s).replace(/'/g, '&#39;'); }
function workById(id) { return DATA?.werke?.find(w => w.id === id); }
function renderKatalogPage(data) {
  const k = data.katalog?.[0];
  if (!k) return;
  const title = LANG === 'en' ? (k.titel_en || k.titel) : k.titel;
  const teaser = LANG === 'en' ? (k.teaser_en || k.text_en || '') : (k.teaser || k.text_de || '');
  const hrsg = LANG === 'en' ? 'Edited by' : 'Herausgegeben von';
  const texts = LANG === 'en' ? 'Texts' : 'Texte';
  const exhibition = [k.ausstellung, k.ausstellung_ort, k.ausstellung_zeitraum].filter(Boolean).join(' · ');
  document.title = `${title} – Sebastian Friedrich`;
  document.getElementById('katalog-hero').innerHTML = `
    <div class="katalog-hero-cover"><img src="${attr(k.cover)}" alt="${attr(title)}" loading="eager"></div>
    <div class="katalog-hero-content">
      <h2 class="katalog-hero-title">${esc(title)}</h2>
      <ul class="katalog-biblio">
        <li>${esc(k.jahr)} · ${hrsg} ${esc(k.herausgeber || 'John Palatini')}</li>
        <li>${texts}: ${esc((k.autoren || []).join(', '))}</li>
        <li>${esc(k.verlag || '')}${k.isbn ? ' · ISBN ' + esc(k.isbn) : ''}</li>
        <li>${esc(k.reihe || '')}</li>
        ${k.preis ? `<li>${LANG === 'en' ? 'Price' : 'Preis'}: ${esc(LANG === 'en' ? (k.preis_en || k.preis) : k.preis)}</li>` : ''}
        <li>${esc(exhibition)}</li>
      </ul>
      <p class="katalog-teaser">${esc(teaser)}</p>
      <div class="katalog-actions">
        <a class="btn" href="reader.html?buch=${encodeURIComponent(k.id)}" data-reader-open>${ui('katalog.reader')}</a>
        <button class="btn btn-outline" type="button" data-contact-subject="${attr(LANG === 'en' ? (k.bestellen_betreff_en || k.bestellen_betreff) : k.bestellen_betreff)}" data-contact-message="${attr(LANG === 'en' ? (k.bestellen_nachricht_en || k.bestellen_nachricht) : k.bestellen_nachricht)}">${ui('katalog.order')}</button>
      </div>
    </div>`;
  const a = k.aufsatz || {};
  const blocks = (a.blocks || []).map(block => {
    if (block.type === 'figure') {
      const w = workById(block.work_id);
      if (!w) return '';
      const medium = LANG === 'en' ? (w.medium_en || w.medium) : w.medium;
      const metaItems = [
        { label: ui('detail.jahr'), val: w.jahr },
        { label: ui('detail.medium'), val: medium },
        { label: ui('detail.masse'), val: w.masse }
      ].filter(m => m.val).map(m => `<li><span class="essay-work-meta-label">${esc(m.label)}</span><span>${esc(m.val)}</span></li>`).join('');
      return `<figure class="essay-work-card" data-work-id="${attr(w.id)}">
        <button class="essay-work-image" type="button" data-work-lightbox="${attr(w.id)}" aria-label="${attr(w.titel)} öffnen">
          <img src="${attr(w.bild)}" alt="${attr(w.titel + ', ' + w.jahr)}" loading="lazy">
        </button>
        <figcaption class="essay-work-info">
          <h3 class="essay-work-title">${esc(w.titel)}</h3>
          <ul class="essay-work-meta-list">${metaItems}</ul>
        </figcaption>
      </figure>`;
    }
    const paragraph = LANG === 'en' ? (block.text_en || block.text) : block.text;
    return `<p>${esc(paragraph)}</p>`;
  }).join('');
  document.getElementById('essay-wrap').innerHTML = `
    <header class="essay-head">
      <p class="essay-kicker">${ui('essay.kicker')}</p>
      <h2 class="essay-title">${esc(LANG === 'en' ? (a.titel_en || a.titel || '') : (a.titel || ''))}</h2>
      <p class="essay-subtitle">${esc(LANG === 'en' ? (a.untertitel_en || a.untertitel || '') : (a.untertitel || ''))}</p>
      <p class="essay-authors">${esc((a.autoren || []).join(' · '))}</p>
    </header>
    <div class="essay-body">${blocks}</div>`;
  document.querySelectorAll('[data-work-lightbox]').forEach(btn => {
    btn.addEventListener('click', () => openDetail(btn.dataset.workLightbox, [btn.dataset.workLightbox]));
  });
}
function onLangChange() { if (DATA) renderKatalogPage(DATA); }
async function init() {
  applyI18n();
  initNav(false);
  initContactInteractions();
  const res = await fetch('data.json');
  DATA = await res.json();
  renderFooter(DATA);
  renderKatalogPage(DATA);
  initLightbox();
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
