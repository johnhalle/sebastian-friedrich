<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danke – Sebastian Friedrich</title>
  <meta name="description" content="Danke für Ihre Nachricht an Sebastian Friedrich.">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#ffffff">

  <link rel="stylesheet" href="sf-base.css?v=52">
  <style>
    .thanks-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      padding: calc(var(--nav-h) + clamp(44px, 7vw, 96px)) clamp(16px, 3vw, 48px) clamp(64px, 8vw, 120px);
    }
    .thanks-inner {
      max-width: 900px;
      margin: 0 auto;
    }
    .thanks-title {
      font-size: clamp(4rem, 13vw, 10rem);
      font-weight: 300;
      letter-spacing: -0.07em;
      line-height: 0.9;
      text-transform: uppercase;
      margin-bottom: clamp(28px, 5vw, 56px);
      padding-bottom: clamp(24px, 4vw, 40px);
      border-bottom: 1px solid var(--black);
    }
    .thanks-text {
      max-width: 640px;
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
<main class="thanks-page">
  <div class="thanks-inner">
    <h1 class="thanks-title" data-i18n="thanks.titel">Danke</h1>
    <p class="thanks-text" data-i18n="thanks.text">Ihre Nachricht wurde übermittelt.</p>
    <a class="btn" href="index.html" data-i18n="thanks.home">Zur Startseite</a>
  </div>
</main>
<script src="sf-base.js?v=52"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  applyI18n();
  initNav(false);
  try {
    const res = await fetch('data.json');
    DATA = await res.json();
    renderFooter(DATA);
  } catch (e) {
    const yearEl = document.getElementById('footer-year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();
  }
});
</script>
</body>
</html>
