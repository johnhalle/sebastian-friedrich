<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danke – Sebastian Friedrich</title>
  <meta name="description" content="Danke für Ihre Nachricht an Sebastian Friedrich.">
  <link rel="stylesheet" href="sf-base.css?v=28">
  <style>
    .thanks-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      padding: calc(var(--nav-h) + clamp(44px, 7vw, 96px)) clamp(16px, 3vw, 48px) clamp(64px, 8vw, 120px);
    }
    .thanks-inner {
      max-width: 900px;
      margin: 0 auto;
    }
    .thanks-title {
      font-size: clamp(4rem, 13vw, 10rem);
      font-weight: 300;
      letter-spacing: -0.07em;
      line-height: 0.9;
      text-transform: uppercase;
      margin-bottom: clamp(28px, 5vw, 56px);
      padding-bottom: clamp(24px, 4vw, 40px);
      border-bottom: 1px solid var(--black);
    }
    .thanks-text {
      max-width: 640px;
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Sebastian Friedrich</a>
    <ul class="nav-links">
      <li><a href="werke.html" data-i18n="nav.werke">Werke</a></li>
      <li><a href="news.html" data-i18n="nav.news">News</a></li>
      <li><a href="katalog.html" data-i18n="nav.katalog">Katalog</a></li>
      <li><a href="vita.html" data-i18n="nav.vita">Vita</a></li>
      <li><a href="kontakt.html" data-i18n="nav.kontakt">Kontakt</a></li>
      <li><button class="nav-lang" id="nav-lang-btn" onclick="toggleLang()">EN</button></li>
    </ul>
    <button class="nav-hamburger" id="hamburger" onclick="openMenu()" aria-label="Menü öffnen">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="nav-overlay" id="nav-overlay">
  <button class="overlay-close" onclick="closeMenu()" aria-label="Menü schließen">×</button>
  <a href="werke.html" onclick="closeMenu()" data-i18n="nav.werke">Werke</a>
  <a href="news.html" onclick="closeMenu()" data-i18n="nav.news">News</a>
  <a href="katalog.html" onclick="closeMenu()" data-i18n="nav.katalog">Katalog</a>
  <a href="vita.html" onclick="closeMenu()" data-i18n="nav.vita">Vita</a>
  <a href="kontakt.html" onclick="closeMenu()" data-i18n="nav.kontakt">Kontakt</a>
  <button class="overlay-lang" onclick="toggleLang(); closeMenu();" id="overlay-lang-btn">EN</button>
</div>
<main class="thanks-page">
  <div class="thanks-inner">
    <h1 class="thanks-title" data-i18n="thanks.titel">Danke</h1>
    <p class="thanks-text" data-i18n="thanks.text">Ihre Nachricht wurde übermittelt.</p>
    <a class="btn" href="index.html" data-i18n="thanks.home">Zur Startseite</a>
  </div>
</main>
<footer>
  <span class="footer-copy">© <span id="footer-year"></span> Sebastian Friedrich</span>
  <ul class="footer-links">
    <li><a href="impressum.html" data-i18n="footer.impressum">Impressum</a></li>
    <li><a href="datenschutz.html" data-i18n="footer.datenschutz">Datenschutz</a></li>
    <li><a href="https://www.instagram.com/sebastiano_friedrich/" id="footer-instagram" target="_blank" rel="noopener">Instagram</a></li>
  </ul>
</footer>
<script src="sf-base.js?v=28"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  applyI18n();
  initNav(false);
  try {
    const res = await fetch('data.json');
    DATA = await res.json();
    renderFooter(DATA);
  } catch (e) {
    const yearEl = document.getElementById('footer-year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();
  }
});
</script>
</body>
</html>
